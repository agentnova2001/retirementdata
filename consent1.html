<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Consent 1 Signature</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; background: #f5f5f5; font-family: sans-serif; display: flex; justify-content: center; }
    .wrapper { width: 100%; max-width: 420px; padding: 12px; }
    .title { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
    .pad-container { position: relative; width: 100%; height: 110px; border: 1px solid #ccc; overflow: hidden; touch-action: none; background: white; }
    canvas { position: absolute; inset: 0; cursor: crosshair; }
    .buttons { display: flex; gap: 8px; margin-top: 10px; }
    button { flex: 1; padding: 10px 0; font-size: 14px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
    .submit { background: #4a6cf7; color: white; }
    .reset { background: #ddd; color: #333; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="title">개인정보 수집·이용 동의 (필수)</div>
  <div class="pad-container" id="pad">
    <canvas id="canvas"></canvas>
  </div>
  <div class="buttons">
    <button class="reset" onclick="resetPad()">다시하기</button>
    <button class="submit" onclick="submitPad()">제출</button>
  </div>
</div>

<script>
  const pad = document.getElementById("pad");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let drawing = false;
  let hasDrawn = false;
  let currentSide = null;

  function resize() {
    canvas.width = pad.clientWidth;
    canvas.height = pad.clientHeight;
    drawBackground();
  }
  window.addEventListener("resize", resize);
  resize();

  function drawBackground() {
    const w = canvas.width;
    const h = canvas.height;
    ctx.fillStyle = "#cfeeff"; ctx.fillRect(0, 0, w / 2, h); // 좌
    ctx.fillStyle = "#ffffff"; ctx.fillRect(w / 2, 0, w / 2, h); // 우
    ctx.strokeStyle = "#bbb"; ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke();
    ctx.fillStyle = "#000"; ctx.font = "900 11px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "top";
    ctx.fillText("[동의]", w / 4, 6); ctx.fillText("[미동의]", (w * 3) / 4, 6);
    ctx.font = "900 22px sans-serif"; ctx.textBaseline = "middle";
    ctx.fillText("동의", w / 4, h / 2); ctx.fillText("동의하지", (w * 3) / 4, h / 2 - 12); ctx.fillText("않음", (w * 3) / 4, h / 2 + 12);
  }

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - r.left, y: clientY - r.top };
  }

  function getSide(x) { return x < canvas.width / 2 ? "AGREE" : "DISAGREE"; }

  function start(e) {
    const { x, y } = getPos(e);
    const side = getSide(x);
    if (currentSide && side !== currentSide) { resetPad(); return; }
    currentSide = side; drawing = true; hasDrawn = true;
    ctx.beginPath(); ctx.moveTo(x, y);
    if (e.cancelable) e.preventDefault();
  }

  function move(e) {
    if (!drawing) return;
    const { x, y } = getPos(e);
    if (getSide(x) !== currentSide) { resetPad(); return; }
    ctx.strokeStyle = "rgb(0,160,0)"; ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.lineTo(x, y); ctx.stroke();
    if (e.cancelable) e.preventDefault();
  }

  function end() { drawing = false; ctx.closePath(); }

  function resetPad() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    hasDrawn = false;
    currentSide = null;
  }

  function submitPad() {
    if (!hasDrawn) {
      alert("동의 또는 미동의 영역에 표시해주세요.");
      return;
    }

    const consent1_image = canvas.toDataURL("image/png");
    const consent1_flag = currentSide;

    // Typebot으로 데이터 전송 (부모 창으로 메시지 전달)
    if (window.parent) {
      window.parent.postMessage({
        type: "SIGNATURE_SUCCESS", // 이벤트 구분용 타입
        consent1_image: consent1_image,
        consent1_flag: consent1_flag
      }, "*");
    }
  }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);
</script>
</body>
</html>
